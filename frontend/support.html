<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFFFFF">
  <title>Support Dashboard — FlexyPe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="FlexyPe_logo.png">
  <script src="js/guard.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
    <div class="sidebar-logo">
      <img src="FlexyPe_logo.png" alt="FlexyPe Logo" class="sidebar-logo-img">
      <div class="logo-text">
        <span class="logo-name">FlexyPe</span>
        <span class="logo-sub">Support</span>
      </div>
      <button class="sidebar-toggle-btn" id="sidebarToggleBtn" aria-label="Toggle Sidebar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav" aria-label="Main">
      <a href="index.html" class="nav-item" data-route="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="9" rx="1"/>
          <rect x="14" y="3" width="7" height="5" rx="1"/>
          <rect x="14" y="12" width="7" height="9" rx="1"/>
          <rect x="3" y="16" width="7" height="5" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>

      <a href="watchlist.html" class="nav-item" data-route="watchlist">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span>Watchlist</span>
      </a>

      <a href="outreach.html" class="nav-item" data-route="outreach">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <span>Outreach</span>
      </a>

      <a href="changes.html" class="nav-item" data-route="changes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M16 3h5v5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 21H3v-5"/>
        </svg>
        <span>Scan Changes</span>
      </a>

      <a href="batch.html" class="nav-item" data-route="batch">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 22V4c0-.5.2-1 .6-1.4C5 2.2 5.5 2 6 2h12c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4v18"/>
          <path d="M10 6h4"/>
          <path d="M10 10h4"/>
          <path d="M10 14h4"/>
          <path d="M10 18h4"/>
        </svg>
        <span>Batch Scans</span>
      </a>

      <a href="users.html" class="nav-item" id="usersNav" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Users</span>
      </a>

      <a href="support.html" class="nav-item active" id="supportNav" aria-current="page" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <span>Support Dashboard</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="user-block">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-email" id="userEmail">—</div>
          <div class="user-status"><span class="status-dot"></span>Signed in</div>
        </div>
        <button class="user-signout" id="signOutBtn" title="Sign out" aria-label="Sign out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════
       MAIN
       ═══════════════════════════════════════════════ -->
  <div class="main-wrap">
    
    <!-- TOPBAR -->
    <header class="topbar" role="banner">
      <div class="topbar-left">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <h1 class="page-title">Support Dashboard</h1>
        </nav>
      </div>
      <div class="topbar-right">
        <!-- Add standard top right items if needed -->
      </div>
    </header>

    <main class="page page-secondary" id="page-support" role="main">
      
      <!-- CONTROLS -->
      <section class="wl-topbar">
        <div class="wl-stats">
          <h2 style="font-size: 1.1rem; font-weight: 500;">Churned Stores</h2>
        </div>
        <div class="wl-controls">
          <div class="search-box wl-search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="supportSearch" placeholder="Search stores…" aria-label="Search">
          </div>
        </div>
      </section>

      <!-- TABLE -->
      <section class="panel table-panel" style="margin-top: 16px; border-radius: 8px;">
        <div class="table-scroll">
          <table id="supportTable">
            <thead>
              <tr>
                <th>Store</th>
                <th>Reason</th>
                <th>Last Scan</th>
                <th>Checkout Removed</th>
                <th>Notes</th>
                <th>Assigned</th>
              </tr>
            </thead>
            <tbody id="supportTbody">
              <tr>
                <td colspan="6" style="text-align: center; color: #888;">Loading churn data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- Sign-out Modal -->
  <div class="modal-backdrop" id="signOutModal" style="display: none;" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h3 id="modalTitle">Sign out</h3>
      <p>Are you sure you want to sign out?</p>
      <div class="modal-actions">
        <button class="btn-ghost" id="modalCancel">Cancel</button>
        <button class="btn-primary" id="modalConfirm">Sign out</button>
      </div>
    </div>
  </div>

  <script src="js/support.js"></script>
</body>
</html>
