<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFFFFF">
  <title>Change Password — FlexyPe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" type="image/png" href="FlexyPe_logo.png">

  <script src="js/guard.js"></script>
</head>
<body>

  <main class="card" role="main" aria-labelledby="title">
    <header class="card-header">
      <div class="logo-row">
        <img src="FlexyPe_logo.png" alt="FlexyPe Logo" class="sidebar-logo-img">
        <div class="logo-text">
          <span class="logo-name">FlexyPe</span>
          <span class="logo-sub">Security</span>
        </div>
      </div>
      <h1 class="card-title" id="title">Change Password</h1>
      <p class="card-sub" id="subtitle">Update your password to keep your account secure</p>
    </header>

    <div class="card-body">
      <form id="changePasswordForm" onsubmit="event.preventDefault(); return false;">
        <div class="form-group">
          <label for="oldPassword">Current Password</label>
          <input type="password" id="oldPassword" class="form-input" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" class="form-input" placeholder="••••••••" minlength="8" required>
          <div class="modal-sub" style="margin-top: 4px; font-size: 0.8rem;">Must be at least 8 characters</div>
        </div>
        
        <div class="err-msg" id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-top: 8px; display: none;"></div>
        <div class="success-msg" id="successMsg" style="color: #10b981; font-size: 0.9rem; margin-top: 8px; display: none;">Password successfully updated. You can now close this window or return to dashboard.</div>

        <button type="submit" class="btn-primary" id="submitBtn" style="margin-top: 1rem;">Change Password</button>
      </form>
      
      <div style="margin-top: 1.5rem; text-align: center;">
        <a href="javascript:history.back()" style="color: #64748b; font-size: 0.9rem; text-decoration: none;">← Back to Dashboard</a>
      </div>
    </div>
  </main>

  <script>
    document.getElementById("changePasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const oldPassword = document.getElementById("oldPassword").value;
      const newPassword = document.getElementById("newPassword").value;
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");
      const btn = document.getElementById("submitBtn");

      errorMsg.style.display = "none";
      successMsg.style.display = "none";

      if (newPassword.length < 8) {
        errorMsg.textContent = "New password must be at least 8 characters.";
        errorMsg.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Updating...";

      try {
        const session = window.FP_AUTH?.getSession?.() || { email: window.FP_currentUser };
        const res = await fetch('http://localhost:8080/api/auth/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Email': session.email
          },
          body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
        });

        const data = await res.json();
        if (res.ok) {
          successMsg.style.display = "block";
          document.getElementById("changePasswordForm").reset();
        } else {
          errorMsg.textContent = data.error || "Failed to update password.";
          errorMsg.style.display = "block";
        }
      } catch (err) {
        errorMsg.textContent = "Network error. Make sure you are connected.";
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Change Password";
      }
    });
  </script>
</body>
</html>
